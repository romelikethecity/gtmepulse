<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="100" y="70" fill="#111111" font-family="system-ui,sans-serif" font-size="24" font-weight="700">GTM Engineer Tech Stack</text>
  <text x="100" y="100" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="15">Tool adoption rates from 228 practitioners</text>
  <rect x="100" y="118" width="60" height="3" rx="1.5" fill="#FF4F1F"/>
  <!-- Horizontal bar chart -->
  <!-- Clay -->
  <text x="200" y="185" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">Clay</text>
  <rect x="220" y="170" width="680" height="24" rx="4" fill="#FF4F1F"/>
  <text x="910" y="187" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">84%</text>
  <!-- CRM -->
  <text x="200" y="230" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">CRM</text>
  <rect x="220" y="215" width="745" height="24" rx="4" fill="#FF4F1F" opacity="0.9"/>
  <text x="975" y="232" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">92%</text>
  <!-- AI Coding -->
  <text x="200" y="275" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">AI Coding</text>
  <rect x="220" y="260" width="575" height="24" rx="4" fill="#FF4F1F" opacity="0.8"/>
  <text x="805" y="277" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">71%</text>
  <!-- Enrichment -->
  <text x="200" y="320" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">Enrichment</text>
  <rect x="220" y="305" width="527" height="24" rx="4" fill="#FF4F1F" opacity="0.7"/>
  <text x="757" y="322" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">65%</text>
  <!-- Sequencing -->
  <text x="200" y="365" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">Sequencing</text>
  <rect x="220" y="350" width="486" height="24" rx="4" fill="#FF4F1F" opacity="0.6"/>
  <text x="716" y="367" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">60%</text>
  <!-- n8n/Automation -->
  <text x="200" y="410" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">n8n</text>
  <rect x="220" y="395" width="437" height="24" rx="4" fill="#FF4F1F" opacity="0.5"/>
  <text x="667" y="412" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">54%</text>
  <!-- Python -->
  <text x="200" y="455" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">Python</text>
  <rect x="220" y="440" width="340" height="24" rx="4" fill="#FF4F1F" opacity="0.4"/>
  <text x="570" y="457" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">42%</text>
  <!-- Intent Data -->
  <text x="200" y="500" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="end">Intent Data</text>
  <rect x="220" y="485" width="243" height="24" rx="4" fill="#FF4F1F" opacity="0.3"/>
  <text x="473" y="502" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600">30%</text>
  <!-- Baseline -->
  <line x1="220" y1="155" x2="220" y2="520" stroke="#E5E5E5" stroke-width="1"/>
</svg>