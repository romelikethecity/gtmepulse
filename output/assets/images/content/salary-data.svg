<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#FAFAFA"/>
  <!-- Subtle grid lines -->
  <line x1="100" y1="480" x2="1100" y2="480" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="100" y1="380" x2="1100" y2="380" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="100" y1="280" x2="1100" y2="280" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="100" y1="180" x2="1100" y2="180" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Y-axis labels -->
  <text x="80" y="485" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="13" text-anchor="end">$0K</text>
  <text x="80" y="385" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="13" text-anchor="end">$75K</text>
  <text x="80" y="285" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="13" text-anchor="end">$150K</text>
  <text x="80" y="185" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="13" text-anchor="end">$225K</text>
  <!-- Salary bars by seniority -->
  <rect x="160" y="320" width="120" height="160" rx="4" fill="#FFD5C8" />
  <rect x="160" y="340" width="120" height="140" rx="4" fill="#FF4F1F" opacity="0.7"/>
  <rect x="360" y="260" width="120" height="220" rx="4" fill="#FFD5C8" />
  <rect x="360" y="290" width="120" height="190" rx="4" fill="#FF4F1F" opacity="0.8"/>
  <rect x="560" y="190" width="120" height="290" rx="4" fill="#FFD5C8" />
  <rect x="560" y="230" width="120" height="250" rx="4" fill="#FF4F1F" opacity="0.9"/>
  <rect x="760" y="140" width="120" height="340" rx="4" fill="#FFD5C8" />
  <rect x="760" y="180" width="120" height="300" rx="4" fill="#FF4F1F"/>
  <!-- Median markers -->
  <line x1="155" y1="370" x2="285" y2="370" stroke="#111111" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="355" y1="330" x2="485" y2="330" stroke="#111111" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="555" y1="270" x2="685" y2="270" stroke="#111111" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="755" y1="220" x2="885" y2="220" stroke="#111111" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- X-axis labels -->
  <text x="220" y="510" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Junior</text>
  <text x="420" y="510" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Mid</text>
  <text x="620" y="510" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Senior</text>
  <text x="820" y="510" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Lead</text>
  <!-- Legend -->
  <rect x="940" y="200" width="14" height="14" rx="2" fill="#FFD5C8"/>
  <text x="962" y="212" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="12">Range</text>
  <rect x="940" y="224" width="14" height="14" rx="2" fill="#FF4F1F"/>
  <text x="962" y="236" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="12">IQR</text>
  <line x1="940" y1="255" x2="954" y2="255" stroke="#111111" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="962" y="260" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="12">Median</text>
  <!-- Title area -->
  <text x="100" y="70" fill="#111111" font-family="system-ui,sans-serif" font-size="24" font-weight="700">GTM Engineer Salary Ranges</text>
  <text x="100" y="100" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="15">Compensation by seniority level, n=228</text>
  <!-- Accent bar -->
  <rect x="100" y="120" width="60" height="3" rx="1.5" fill="#FF4F1F"/>
</svg>