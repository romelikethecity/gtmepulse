<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="100" y="70" fill="#111111" font-family="system-ui,sans-serif" font-size="24" font-weight="700">GTM Engineering Comparisons</text>
  <text x="100" y="100" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="15">Head-to-head analysis of roles, approaches, and strategies</text>
  <rect x="100" y="118" width="60" height="3" rx="1.5" fill="#FF4F1F"/>
  <!-- VS layout - two sides -->
  <rect x="100" y="160" width="460" height="360" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5"/>
  <rect x="640" y="160" width="460" height="360" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- Left side header -->
  <rect x="100" y="160" width="460" height="60" rx="12" fill="#FFFFFF"/>
  <rect x="101" y="160" width="458" height="60" rx="12" fill="#FFF0EB"/>
  <text x="330" y="198" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="20" font-weight="700" text-anchor="middle">Option A</text>
  <!-- Right side header -->
  <rect x="640" y="160" width="460" height="60" rx="12" fill="#FFFFFF"/>
  <rect x="641" y="160" width="458" height="60" rx="12" fill="#F0F0F0"/>
  <text x="870" y="198" fill="#111111" font-family="system-ui,sans-serif" font-size="20" font-weight="700" text-anchor="middle">Option B</text>
  <!-- VS badge -->
  <circle cx="600" cy="190" r="28" fill="#FF4F1F"/>
  <text x="600" y="197" fill="#FFFFFF" font-family="system-ui,sans-serif" font-size="16" font-weight="700" text-anchor="middle">VS</text>
  <!-- Comparison rows -->
  <!-- Row 1 -->
  <text x="330" y="270" fill="#111111" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Technical, code-first</text>
  <text x="870" y="270" fill="#111111" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Process-oriented</text>
  <text x="600" y="273" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Approach</text>
  <line x1="140" y1="290" x2="520" y2="290" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="680" y1="290" x2="1060" y2="290" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Row 2 -->
  <text x="330" y="325" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">$180K</text>
  <text x="870" y="325" fill="#111111" font-family="system-ui,sans-serif" font-size="22" font-weight="700" text-anchor="middle">$135K</text>
  <text x="600" y="328" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Median Salary</text>
  <line x1="140" y1="345" x2="520" y2="345" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="680" y1="345" x2="1060" y2="345" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Row 3 -->
  <text x="330" y="380" fill="#111111" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Clay + Python + APIs</text>
  <text x="870" y="380" fill="#111111" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">CRM + Process + Docs</text>
  <text x="600" y="383" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Core Stack</text>
  <line x1="140" y1="400" x2="520" y2="400" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="680" y1="400" x2="1060" y2="400" stroke="#F0F0F0" stroke-width="1"/>
  <!-- Row 4 -->
  <text x="330" y="435" fill="#111111" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Pipeline built, meetings booked</text>
  <text x="870" y="435" fill="#111111" font-family="system-ui,sans-serif" font-size="14" text-anchor="middle">Systems running, team enabled</text>
  <text x="600" y="438" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Success Metric</text>
  <!-- Row 5 -->
  <rect x="240" y="460" width="180" height="34" rx="6" fill="#FF4F1F" opacity="0.1"/>
  <text x="330" y="482" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">205% YoY growth</text>
  <rect x="780" y="460" width="180" height="34" rx="6" fill="#F0F0F0"/>
  <text x="870" y="482" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Established path</text>
  <!-- Bottom note -->
  <text x="600" y="570" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Data-driven comparisons with real salary and survey data</text>
</svg>