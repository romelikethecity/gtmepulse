<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="100" y="70" fill="#111111" font-family="system-ui,sans-serif" font-size="24" font-weight="700">GTM Engineering Insights</text>
  <text x="100" y="100" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="15">Data-driven analysis, playbooks, and market intelligence</text>
  <rect x="100" y="118" width="60" height="3" rx="1.5" fill="#FF4F1F"/>
  <!-- Main chart area - line chart showing growth -->
  <rect x="100" y="160" width="680" height="340" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="140" y1="220" x2="740" y2="220" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="140" y1="280" x2="740" y2="280" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="140" y1="340" x2="740" y2="340" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="140" y1="400" x2="740" y2="400" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="140" y1="460" x2="740" y2="460" stroke="#E5E5E5" stroke-width="1"/>
  <!-- Trend line - job posting growth -->
  <polyline points="160,440 240,430 320,410 400,380 480,340 560,280 640,220 720,190" fill="none" stroke="#FF4F1F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area fill under line -->
  <polygon points="160,440 240,430 320,410 400,380 480,340 560,280 640,220 720,190 720,460 160,460" fill="#FF4F1F" opacity="0.08"/>
  <!-- Data points -->
  <circle cx="160" cy="440" r="4" fill="#FF4F1F"/>
  <circle cx="320" cy="410" r="4" fill="#FF4F1F"/>
  <circle cx="480" cy="340" r="4" fill="#FF4F1F"/>
  <circle cx="640" cy="220" r="4" fill="#FF4F1F"/>
  <circle cx="720" cy="190" r="5" fill="#FF4F1F" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Chart labels -->
  <text x="160" y="480" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Q1</text>
  <text x="300" y="480" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Q2</text>
  <text x="440" y="480" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Q3</text>
  <text x="580" y="480" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Q4</text>
  <text x="720" y="480" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Now</text>
  <text x="140" y="185" fill="#111111" font-family="system-ui,sans-serif" font-size="13" font-weight="600">GTME Job Postings</text>
  <!-- Right side - metric cards -->
  <rect x="820" y="160" width="280" height="100" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="850" y="195" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1">TOTAL POSTINGS</text>
  <text x="850" y="230" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="32" font-weight="700">3,342</text>
  <text x="990" y="230" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13">+205% YoY</text>
  <rect x="820" y="280" width="280" height="100" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="850" y="315" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1">MEDIAN SALARY</text>
  <text x="850" y="350" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="32" font-weight="700">$135K</text>
  <text x="977" y="350" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13">+12% YoY</text>
  <rect x="820" y="400" width="280" height="100" rx="8" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="850" y="435" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1">REMOTE ROLES</text>
  <text x="850" y="470" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="32" font-weight="700">62%</text>
  <text x="940" y="470" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13">of all postings</text>
  <!-- Bottom bar -->
  <text x="600" y="570" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">Updated weekly with fresh market data</text>
</svg>