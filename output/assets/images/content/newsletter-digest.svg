<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#FAFAFA"/>
  <!-- Title -->
  <text x="100" y="70" fill="#111111" font-family="system-ui,sans-serif" font-size="24" font-weight="700">The GTME Pulse Newsletter</text>
  <text x="100" y="100" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="15">Weekly job market data, salary shifts, and tool intel</text>
  <rect x="100" y="118" width="60" height="3" rx="1.5" fill="#FF4F1F"/>
  <!-- Email mockup -->
  <rect x="200" y="160" width="800" height="420" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1.5"/>
  <!-- Email header -->
  <rect x="201" y="161" width="798" height="55" rx="12" fill="#FFFFFF"/>
  <line x1="200" y1="216" x2="1000" y2="216" stroke="#F0F0F0" stroke-width="1"/>
  <circle cx="240" cy="188" r="14" fill="#FF4F1F"/>
  <text x="240" y="193" fill="#FFFFFF" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="middle">GP</text>
  <text x="268" y="184" fill="#111111" font-family="system-ui,sans-serif" font-size="13" font-weight="600">GTME Pulse Weekly</text>
  <text x="268" y="200" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11">insights@gtmepulse.com</text>
  <text x="940" y="192" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="11" text-anchor="end">Every Monday</text>
  <!-- Email body -->
  <text x="250" y="255" fill="#111111" font-family="system-ui,sans-serif" font-size="18" font-weight="700">This Week in GTM Engineering</text>
  <rect x="250" y="268" width="40" height="3" rx="1.5" fill="#FF4F1F"/>
  <!-- Section 1: Job Market -->
  <rect x="250" y="290" width="700" height="70" rx="6" fill="#FFF0EB"/>
  <text x="280" y="315" fill="#FF4F1F" font-family="system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1">JOB MARKET</text>
  <text x="280" y="340" fill="#111111" font-family="system-ui,sans-serif" font-size="14">3,342 open roles (+8% WoW)  |  $135K median  |  62% remote</text>
  <!-- Section 2: Salary Shifts -->
  <rect x="250" y="375" width="340" height="60" rx="6" fill="#FFFFFF" stroke="#F0F0F0" stroke-width="1"/>
  <text x="270" y="398" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="10" font-weight="600">SALARY TREND</text>
  <text x="270" y="420" fill="#111111" font-family="system-ui,sans-serif" font-size="14">Senior roles up 4% this month</text>
  <rect x="610" y="375" width="340" height="60" rx="6" fill="#FFFFFF" stroke="#F0F0F0" stroke-width="1"/>
  <text x="630" y="398" fill="#9B9B9B" font-family="system-ui,sans-serif" font-size="10" font-weight="600">TOP HIRING</text>
  <text x="630" y="420" fill="#111111" font-family="system-ui,sans-serif" font-size="14">Clay, Apollo, HubSpot lead</text>
  <!-- Section 3: Tool intel -->
  <text x="250" y="470" fill="#111111" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Tool Intel</text>
  <line x1="250" y1="480" x2="950" y2="480" stroke="#F0F0F0" stroke-width="1"/>
  <text x="270" y="500" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13">n8n surpasses Make in job postings for first time</text>
  <text x="270" y="525" fill="#6B6B6B" font-family="system-ui,sans-serif" font-size="13">Claude mentions up 340% in GTME job descriptions</text>
  <!-- CTA button -->
  <rect x="430" y="545" width="340" height="42" rx="8" fill="#FF4F1F"/>
  <text x="600" y="572" fill="#FFFFFF" font-family="system-ui,sans-serif" font-size="14" font-weight="600" text-anchor="middle">Get the Weekly Pulse</text>
</svg>